name: Daily News Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    # --- 新增下面这两行，强制开启写入权限 ---
    permissions:
      contents: write
    # --------------------------------------
    steps:
      - name: 检查代码
        uses: actions/checkout@v4 # 升级到 v4 更稳定

      - name: 安装 Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.9'

      - name: 安装必要的工具
        run: pip install requests

      - name: 执行抓取脚本
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
        run: python fetch_news.py

      - name: 将更新后的数据存回仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add latest_news.json
          # 检查是否有内容变化，没有就不提交，避免报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新拉美新闻: $(date)" && git push origin main)
