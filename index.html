<script>
        async function loadNews() {
            try {
                // 加上时间戳防止浏览器缓存旧新闻
                const response = await fetch('latest_news.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('无法读取新闻数据文件');
                
                const newsData = await response.json();
                const container = document.getElementById('news-container');
                container.innerHTML = ''; 

                newsData.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // --- 修复逻辑：增加防御性判断 ---
                    // 如果 item.country 存在且是字符串，就变大写；否则显示 'LATAM'
                    const countryLabel = (item.country && typeof item.country === 'string') 
                                        ? item.country.toUpperCase() 
                                        : 'LATAM';
                    
                    const imageUrl = item.image_url || 'https://via.placeholder.com/400x200?text=LatAm+News';
                    
                    card.innerHTML = `
                        <a href="${item.link}" target="_blank">
                            <img src="${imageUrl}" alt="news">
                            <div class="card-content">
                                <div class="card-title">${item.title}</div>
                                <div class="card-desc">${item.description || '点击查看详情...'}</div>
                                <div class="card-meta">
                                    <span class="tag">${countryLabel}</span>
                                    <span>${item.pubDate ? new Date(item.pubDate).toLocaleDateString() : ''}</span>
                                </div>
                            </div>
                        </a>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('news-container').innerHTML = `<p>加载失败: ${error.message}</p>`;
            }
        }

        loadNews();
    </script>
